mixed_prec:
  enabled: true  # {true, false}; mixed precision for training and validation
  amp_dtype: fp16  # {fp16, bf16}; autocast dtype -- only relevant when enabled = true. fp16 pairs with GradScaler
                   # loss-scaling (enabled automatically); bf16 skips the scaler (fp32-range exponent) -- prefer
                   # bf16 on Ampere+ (A100/B200)
act_chkpt: false  # {true, false}; activation checkpointing
compile: false  # {true, false}; torch.compile the DDP-wrapped train model; pays first-step compile latency for faster steady-state steps

tf32_conv: true  # {true, false}; TF32 tensor cores for cuDNN convolutions (torch.backends.cudnn.allow_tf32) (PyTorch default is true)
cudnn_benchmark: false  # {true, false}; cuDNN autotunes conv algorithms per input shape; speedup for fixed-shape
                        # batches, trades away algo-choice reproducibility (PyTorch default is false)

prefetch_factor: 4  # dataloader prefetch factor
max_n_workers_gpu: null  # hard ceiling on workers/GPU; null -> auto = (n_cpus // n_gpus) - 2, scales with the live alloc
pin_memory: true  # {true, false}; dataloader pins host RAM for faster host --> GPU copies, higher RAM cost

persistent_workers_train: true  # {true, false}; keep train dataloader workers alive across train epochs
persistent_workers_eval: true  # {true, false}; keep eval dataloader workers alive across validation epochs

use_img_cache: true  # {true, false}; read images from the prebuilt per-dataset pack (tools/build_img_cache.py),
                     # staged once per node to node-local scratch (SLURM_TMPDIR/TMPDIR//tmp) -- replaces
                     # per-sample reads from the shared FS. Errors at startup if the pack hasn't been built.

eval:
  map_chunk_size:
    img2img: 512  # {512, 1_024, 2_048, 4_096, 8_192, 16_384}
    cross_modal: 512
  # t-SNE transient GPU buffer = 2^X fp32 (X=28 -> 1 GiB, each +1 doubles it). Pure memory<->speed,
  # doesn't change the projection: bigger X = faster if you have VRAM, smaller X if it OOMs.
  tsne_chunk_log2: 30

pg_timeout: 600  # NCCL collective watchdog timeout, in seconds. A hang aborts (and dumps its flight-recorder
                 # trace) after this; the campaign runner then resumes the trial from its last checkpoint. Keep
                 # it above the longest legit gap between collectives -- the per-partition eval embedding pass
                 # -- or large-dataset evals false-timeout. (PyTorch default is 600s)
max_retries: 2  # max *consecutive* trial retries that make no forward progress before giving up; retries that
                # advance the checkpoint reset this, so genuine flakes at different points recover unbounded.