split: D10
train_pt: train  # {train, trainval}

sample_volume: 1_000_000
chkpt_every: 200_000
batch_size: 2_048  # {16, 32, 64, 128, 256, 512, 1_024, 2_048, 4_096, 8_192, 16_384, 32_768}
dv_batching: false  # (true) dorsal/ventral-homogeneous batch sampling (only applicable to lepid/nymph)

arch:  # architecture
  model_type: siglip_vitb16  # {bioclip, clip_vitb16, siglip_vitb16}
  clip:  # CLIP-specific
    non_causal: false  # (true) converts text encoder causal attention mask to non-causal (zeros on diagonal + lower triangle, -inf on upper --> all zeros); base eval: the native causal mask is always restored (non_causal undone) so the shared base_eval_cache stays a stable pretrained-as-released reference
  siglip:  # SigLIP-specific
    vis_proj: null  # {null, linear, mlp}; vision projection head over the MAP-pooled image feature -- null: none, use the pretrained MAP output directly (current); linear: Linear(768-->768); mlp: 768-->1536-->768 GELU MLP. linear/mlp add randomly-initialized params (absent from the pretrained checkpoint) and are the only settings under which dropout.siglip.vis_proj is active. base eval: this head is always skipped (headless pretrained MAP output) so the shared base_eval_cache stays head-/seed-invariant

dropout:  # vision-tower (image encoder) regularization only -- text tower is unaffected; all off by default (== current behavior)
  patch_dropout: 0.0  # [0.0, 1.0); CLIP + SigLIP; fraction of image patches dropped each training step (0.0 = disabled)
  siglip:  # SigLIP-specific
    vis_proj: 0.0  # [0.0, 1.0); dropout on the vision projection head -- only active when arch.siglip.vis_proj is linear/mlp, inert for the default MAP head (0.0 = disabled)
    stoch_depth: null  # [0.0, 1.0) or null; vision-backbone stochastic depth / drop-path rate (null = disabled)

freeze:
  image: false
  text: false

htarg_shuf: false

loss:  # primary loss
  type: bce  # {infonce1, infonce2, bce}
  sim: cos  # {cos, geo1, geo2}
  targ: sw  # {iw, sw, tax, phylo}
  wting:
    cp_type: 1  # {1, 2}; class-pair computation type (only relevant for 2D-weighting); 1: vanilla (i2t, t2i for same pair treated as separate "classes"), 2: negative pairs multiplied by 2, upper triangle extracted and used to normalize, full matrix constructed with normalized weights (i2t, t2i for same pair treated as same "classes")
    type: inv_freq  # {inv_freq, class_bal, null}; `inv_freq` --> inverse-frequency, `class_bal` --> class-balanced, `null` to disable
    inv_freq:  # inverse-frequency weighting; only relevant if `type: inv_freq`
      gamma: 0.5  # (0.0, 1.0]; 1 / n_c^gamma; gamma=1.0 → classic, gamma=0.5 → sqrt, gamma=0.0 → uniform (no weighting)
    class_bal:  # class-balanced weighting; only relevant if `type: class_bal`
      beta: 0.9999  # [0.0, 1.0); only used for `type: class_bal`; controls aggressiveness
  focal:
    gamma: 2.0  # [0.0, inf); down-weights easy samples, larger gamma → stronger focus on hard cases; 1-2 for softmax (InfoNCE), 2 for sigmoid (BCE); FL reduces to CE (FL → CE) when gamma = 0.0
    comp_type: 1  # {1, 2}; continuous-form focal loss computation type; identical behavior to discrete form when targets=0/1; not relevant for 1D-weighted InfoNCE
  dsmr: true  # dynamic similarity mass rebalancing; only relevant for BCE
  reduce:
    denom: wt_mean  # {wt_mean, per_samp} (WANT BETTER NAME THAN "per_samp"); wt_mean: /W.sum() -> per-pair weighted mean; per_samp: /B -> per-sample sum (SigLIP convention)
    wt_invar: true  # {true, false}; (true) rescale loss to the unweighted magnitude so gradient scale is invariant to the weighting scheme; renders loss.reduce.denom inert
  logits:
    scale_init: null  # null for existing learnable param (or 0.0 non-learnable if non-existent), float for learnable param override init
    bias_init: null  # null for existing learnable param (or 0.0 non-learnable if non-existent), float for learnable param override init
    freeze_scale: false  # (true) non-learnable temp
    freeze_bias: false  # (true) non-learnable bias

loss2:  # secondary loss
  mix: 0.0  # [0.0, 1.0); set to 0.0 to disable
  type: bce  # {infonce1, infonce2, bce}
  sim: cos  # {cos, geo1, geo2}; note: if loss2.sim is different from loss.sim, min/max/mean/median similarity metrics are incorrect
  targ: phylo  # {iw, sw, tax, phylo}
  wting:
    cp_type: 1  # {1, 2}
    type: inv_freq  # {inv_freq, class_bal, null}
    inv_freq:
      gamma: 0.5  # (0.0, 1.0]
    class_bal:
      beta: 0.9999  # [0.0, 1.0)
  focal:
    gamma: 2.0  # [0.0, inf)
    comp_type: 1  # {1, 2}
  dsmr: true
  reduce:
    denom: wt_mean  # {wt_mean, per_samp}
    wt_invar: true  # {true, false}
  logits:
    scale_init: null
    bias_init: null
    freeze_scale: false
    freeze_bias: false

aug:  # image augmentation
  rrcrop:  # random resized crop
    scale_min: 0.9  # down-scale wrt area, scale randomly picked from [scale_min, 1.0]; OpenCLIP default: [0.9, 1.0]
  hflip: false  # {true, false}; horizontal flip w/ 50% probability
  cjit:  # color jitter
    brightness: 0.1
    contrast: 0.2
    saturation: 0.1
    hue: 0.01
    prob: 0.0
  sharpness:
    factor: 1.333  # (1.0, inf); sharpness range = [1.0 / factor, factor]; 1.0 --> no change; less than 1.0 reduces sharpness, greater than 1.0 increases sharpness
    prob: 0.00
  gblur:  # gaussian blur
    kernel_size: 3  # must be odd int
    sigma:
      min: 0.0
      max: 1.0
    prob: 0.00
img_norm: default  # {default, dataset}

text_template:
  train: train
  eval: sci  # following BioCLIP eval protocol

opt:  # optimization
  lr:  # learning rate
    init: 3.2e-5
    decay_factor: 1.0e-4  # cosine scheduler eta_min = opt.lr.init * opt.lr.decay_factor
    warmup: 200_000  # sample volume for linear LR warmup
  l2reg: null  # if `null`, resolved from model-specific default hyperparam config
  beta1: 0.9  # CLIP paper recommends Beta1 = 0.9
  beta2: null  # if `null`, resolved from model-specific default hyperparam config
  eps: 1.0e-6  # CLIP paper recommends eps = 1.0e-6 (ViT)

stats:
  spread_type: std  # {std, ste}
  table_eval_group: closed_standard  # {closed_standard, closed_macro, full_standard, full_macro}
  xlsx:
    bold_high: true  # {true, false}; (true) bold item with highest mean per row
    ordered: true  # {true, false}; (true) order columns by the always-shown harmonic-mean table's "All" row
    heatmap: fixed  # {null, scaled, fixed}; null -> no heatmap, scaled -> heatmap scaled to row mins/maxs, fixed -> heatmap scaled to a fixed range

dev:
  debug_mode: false  # {true, false}
  debug:  # parameters overridden with `debug_mode: true`
    sample_volume: 6_000
    chkpt_every: 3_000
    batch_size: 128
  traintime_evals: true  # {true, false}; (true) run evals at each checkpoint threshold (metrics + viz + evolution GIFs); (false) only base/final evals run
  manifold_viz:
    n_trials: 0  # number of trials (per setting) to compute and save PCA + t-SNE projections to disk; setting to 0 overrides plot_Xpanel flags to false
    plot_2panel: true  # {true, false}; (true) plot 2-panel PCA's + t-SNE's
    plot_4panel: true  # {true, false}; (true) plot 4-panel PCA's + t-SNE's
    plot_7panel: true  # {true, false}; (true) plot 7-panel PCA's + t-SNE's
    # note: with n_trials >= 1 and all 3 flags = false, projections will still be computed and saved to disk
    pooled:  # "pooled" shared-frame manifold viz: one PCA + t-SNE fit on all eval thresholds' embeddings pooled, then each threshold plotted as a masked subset of the shared layout (plot_Xpanel flags select the same groups, rendered under viz_pooled/)
      enabled: true  # {true, false}; (true) cache per-eval embeddings, compute the pooled projection at end-of-trial, and render the pooled plots
      budget: 100_000  # pooled t-SNE point budget as a total sample volume across all thresholds; if (N_id + N_ood) * n_evals <= budget all samples are used, else the pool is class-stratified subsampled to ~budget points total (larger budget needs proportionally more GPU memory)
      pca_bounds: final  # {null, final}
  logging: true
  continue_campaign: false  # {true, false}; (true) resume/extend an existing campaign of the same name; (false) if the campaign name (incl. suffix) already has an artifacts dir, fall back to the first free <name>2, <name>3, ...
  del_base_eval_cache:
    campaign: false  # {true, false}; (true) delete base_eval_cache/ once, when the campaign is first created (relaunches keep the cache the campaign's own trials built)
    trial: false  # {true, false}; (true) delete base_eval_cache/ before each trial launch, so every trial re-runs its base eval (apples-to-apples wall-clock comparisons)
