study_name:      dev
experiment_name: dev
seed:            42
# split_name:      S29-42
split_name:      P37-42
# split_name:      dev

n_epochs:    100
chkpt_every: 1
batch_size:  1024  # 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384, 32768
dv_batching: true  # (true) dorsal/ventral-homogeneous batching

dev:
  allow_overwrite_trial: true
  allow_diff_study:      true
  allow_diff_experiment: true

arch:  # architecture
  model_type: siglip_vitb16  # commonly used: {bioclip, clip_vitb16, siglip_vitb16}
  non_causal: false  # (true) converts text encoder causal attention mask to non-causal (zeros on diagonal + lower triangle, -inf on upper --> all zeros) -- only applicable to CLIP and ViTamin (SigLIP already uses non-causal i.e. bidirectional)

loss:
  type: bce  # {infonce1, infonce2, bce}
  sim: cos  # {cos, geo1, geo2}
  targ: multipos  # {aligned, multipos, tax, phylo}
  wting: false
  focal: false
  dyn_smr: false  # dynamic similarity mass rebalancing (multi-pos, aligned, hierarchical?); only relevant for BCE (and perhaps regression)

# same settings should be equivalent
loss2:  # secondary loss
  mix: 0.0  # set to 0.0 to disable computation
  type: bce  # {infonce1, infonce2, bce}
  sim: geo1  # {cos, geo1, geo2}
  targ: phylo
  wting: true
  focal: true
  dyn_smr: true  # dynamic similarity mass rebalancing (multi-pos, aligned, hierarchical?); only relevant for BCE (and perhaps regression)

opt:  # optimization
  lr:  # learning rate
    init: 1.0e-5
    # init: 9.8e-9
    # init: 5.0e-7
    sched: exp
    warmup: 100_000  # sample volume for linear LR warmup
  l2reg: 0.2  # CLIP paper recommends weight_decay = 0.2 <-- this may be just for pretrain, look into it
  beta1: 0.9  # CLIP paper recommends Beta1 = 0.9
  beta2: 0.98  # seminal papers recommend Beta2 = 0.999 (CLIP ResNet) / 0.98 (CLIP ViT) / 0.95 (SigLIP) ~ careful, may be for pretraining not fine-tuning
  eps: 1.0e-6  # CLIP paper recommends eps = 1.0e-8 (ResNet) / 1.0e-6 (ViT)

freeze:
  image: false
  text: false

text_preps:
  # train: mixed
  train: combo_temps
  valid: bioclip_sci

logging: true