rfpath_model: null  # relative filepath to checkpointed model weights (set null for base model)
# rfpath_model: artifacts/dev/dev/lepid/42/chkpts/best_comp/model.pt  # dataset_name, split_name, model_type, non_causal are overridden if rfpath_model is specified
dataset_name: cub  # {bryo, cub, lepid, nymph}
split_name: D10  # {D10, dev}
eval_type: validation  # {validation, test}

batch_size: 1024  # 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384, 32768

arch:
  model_type: siglip_vitb16  # {bioclip, clip_vitb16, siglip_vitb16}
  non_causal: false

img_norm: default  # {default, dataset}

text_template: sci  # following BioCLIP eval protocol